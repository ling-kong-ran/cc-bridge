<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC Bridge</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #e5e7eb; -webkit-app-region: drag; user-select: none; }
    .card { width: min(520px, calc(100vw - 48px)); padding: 28px; border: 1px solid #374151; border-radius: 18px; background: #1f2937; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { margin: 8px 0 0; color: #9ca3af; line-height: 1.6; }
    .spinner { width: 28px; height: 28px; border: 3px solid #374151; border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="card">
    <div class="spinner"></div>
    <h1>正在启动 CC Bridge</h1>
    <p>正在准备本地服务和运行环境，请稍候。</p>
  </main>
</body>
</html>
