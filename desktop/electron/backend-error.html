<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC Bridge 启动失败</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #e5e7eb; }
    .card { width: min(680px, calc(100vw - 48px)); padding: 28px; border: 1px solid #7f1d1d; border-radius: 18px; background: #1f2937; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { margin: 8px 0 0; color: #d1d5db; line-height: 1.6; }
    code { color: #fca5a5; }
  </style>
</head>
<body>
  <main class="card">
    <h1>CC Bridge 后端启动失败</h1>
    <p>请检查 <code>~/.ccb/bootstrap.log</code> 和 <code>~/.ccb/server.log</code>。</p>
    <p>如果是首次启动，请确认已安装 Python 与 Claude Code CLI；全量包不会内置或自动安装这两项。</p>
  </main>
</body>
</html>
