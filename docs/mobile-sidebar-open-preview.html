<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../static/fonts.css">
  <link rel="stylesheet" href="../static/style.css">
  <style>
    body { margin: 0; }
    #page-home { display: none; }
    #page-chat { display: block; }
    #page-chat.page { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body data-variant="calm" class="pane-right-open mobile-overlay">
  <div class="stage">
    <section class="window" aria-label="CC Bridge desktop workspace">
      <header class="titlebar">
        <div class="brand"><button class="mobile-menu-toggle" type="button"><span></span><span></span><span></span></button><div class="mark">CC</div></div>
        <div class="session-strip"><span class="titlebar-page-label crumb">Chat</span></div>
        <div class="actions"><button id="btn-toggle-right-panel" class="titlebar-btn active" type="button">▣</button></div>
      </header>
      <div class="app">
        <aside class="sidebar"><nav class="nav"><button class="new-session nav-new-session">New Session</button></nav></aside>
        <main class="main">
          <div id="page-chat" class="page active">
            <div class="chat-main"><div class="session-workspace"><div class="workspace-tabs-shell"></div><div class="workspace-panes"><section class="workspace-pane active"><div class="messages"></div></section></div></div><div class="input-area"><div class="input-shell"><div class="input-wrapper"><textarea></textarea></div></div></div></div>
            <div id="chat-sidebar" class="chat-sidebar open">
              <div id="chat-sidebar-resizer" class="chat-sidebar-resizer"></div>
              <div class="chat-sidebar-content"><div class="chat-sidebar-body"><section class="right-runtime-panel"><details class="runtime-panel" open><summary class="runtime-summary"><span>Runtime Settings</span><span class="runtime-summary-value">CWD / Remote</span></summary><div class="runtime-panel-body"><label class="field-label">Working Directory</label><div class="cwd-wrapper"><input class="input cwd-input" value="E:/code/cc-bridge"><button class="btn-browse">...</button></div><label class="field-label">Remote Target</label><select class="select"><option>Local</option></select></div></details></section><section class="file-tree-panel"><div class="file-tree-toolbar"><div class="file-tree-context"><div class="file-tree-path">E:/code/cc-bridge</div></div><button class="btn-icon-mini">↻</button></div><div class="file-tree-filter-row"><input class="file-tree-filter" placeholder="Filter files..."></div><div class="file-tree-content"><div class="file-tree-item">static/</div><div class="file-tree-item">server.py</div><div class="file-tree-item">ccb_bridge.py</div></div></section></div></div>
            </div>
          </div>
        </main>
        <div id="mobile-sidebar-backdrop" class="mobile-sidebar-backdrop visible"></div>
      </div>
    </section>
  </div>
</body>
</html>
