name: Desktop Release
on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  # ─── Build Python Sidecar ────────────────────────────────────────
  build-sidecar:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: server.exe
            python-arch: x64
          - os: macos-latest
            artifact: server
            python-arch: x64
          - os: ubuntu-latest
            artifact: server
            python-arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build sidecar
        run: |
          cd desktop
          mkdir -p src-tauri/binaries/server
          python -m PyInstaller build/pyinstaller.spec --distpath src-tauri/binaries/server --workpath build/pyinstaller-work --clean --noconfirm
      - name: Upload sidecar
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ runner.os }}
          path: desktop/src-tauri/binaries/server/${{ matrix.artifact }}

  # ─── Build Tauri Desktop App ─────────────────────────────────────
  build-tauri:
    needs: build-sidecar
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust-arch: x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            rust-arch: x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust-arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ runner.os }}
          path: desktop/src-tauri/binaries/server/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          # Make sidecar executable
          chmod +x desktop/src-tauri/binaries/server/server

      - name: Install npm deps
        run: cd desktop && npm install

      - name: Build Tauri
        run: cd desktop && npx tauri build --target ${{ matrix.target }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  # ─── Create GitHub Release ───────────────────────────────────────
  release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: dist/

      - name: Create latest.json
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          cat > dist/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/ling-kong-ran/cc-gui/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {}
          }
          EOF

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.exe
            dist/latest.json
          draft: true
