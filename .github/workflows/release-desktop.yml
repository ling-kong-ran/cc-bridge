name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，例如 0.1.3。留空则使用 package.json 当前版本。'
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set package version
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          TARGET_VERSION="${{ inputs.version }}"
          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "package.json already at $TARGET_VERSION"
          else
            npm version "$TARGET_VERSION" --no-git-tag-version
          fi

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload versioned package files
        uses: actions/upload-artifact@v4
        with:
          name: release-package-files
          path: |
            package.json
            package-lock.json

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run desktop:dist:win -- --publish never
          - platform: macos
            os: macos-latest
            command: npm run desktop:dist:mac -- --publish never
          - platform: linux
            os: ubuntu-latest
            command: npm run desktop:dist:linux -- --publish never
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download versioned package files
        uses: actions/download-artifact@v4
        with:
          name: release-package-files
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python entry syntax
        run: python -m py_compile server.py bootstrap.py bootstrap/launcher.py

      - name: Install npm dependencies
        run: npm ci

      - name: Build desktop package
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            release/*
            !release/*-unpacked/**
            !release/win-unpacked/**
            !release/mac/**
            !release/linux-unpacked/**

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: CC Bridge ${{ needs.prepare.outputs.version }}
          body: CC Bridge desktop release ${{ needs.prepare.outputs.version }}
          files: artifacts/desktop-*/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
